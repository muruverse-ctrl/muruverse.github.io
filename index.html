<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PS4 Jailbreak Host</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
background-size:400% 400%;
animation:gradientBG 10s ease infinite;
color:white;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
text-align:center;
background:rgba(0,0,0,0.6);
padding:40px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(0,0,0,0.6);
animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

h1{
font-size:40px;
margin-bottom:10px;
}

.subtitle{
opacity:0.7;
margin-bottom:30px;
}

.buttons{
display:grid;
grid-template-columns:repeat(2,200px);
gap:20px;
justify-content:center;
}

button{
padding:15px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
color:white;
transition:0.3s;
position:relative;
overflow:hidden;
}

button::before{
content:"";
position:absolute;
width:100%;
height:100%;
top:0;
left:-100%;
background:rgba(255,255,255,0.2);
transition:0.5s;
}

button:hover::before{
left:100%;
}

.goldhen{
background:#ff9800;
}

.payload{
background:#00bcd4;
}

.tools{
background:#4caf50;
}

.cache{
background:#e91e63;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 15px rgba(255,255,255,0.3);
}

.footer{
margin-top:30px;
font-size:12px;
opacity:0.6;
}

</style>
</head>

<body>

<div class="container">

<h1>PS4 Jailbreak Host</h1>
<div class="subtitle">Firmware 9.00</div>

<div class="buttons">

<button class="goldhen" onclick="loadGoldHen()">Load GoldHEN</button>

<button class="payload" onclick="payload()">Payload Menu</button>

<button class="tools" onclick="tools()">Tools</button>

<button class="cache" onclick="cache()">Cache Offline</button>

</div>

<div class="footer">
Powered by WebHost
</div>

</div>

<script>

function loadGoldHen(){
alert("Loading GoldHEN...");
}

function payload(){
alert("Opening Payload Menu...");
}

function tools(){
alert("Opening Tools...");
}

function cache(){
alert("Caching for Offline...");
}

</script>

</body>
</html>
